# errwatch config for the TouchStrip Swift app.
# Watches *.swift and runs a debug SwiftPM build on change. Swift compiler
# diagnostics ("File.swift:line:col: error|warning: message") are parsed by the
# regex analyzer, so errors show with file + line + column. If the regex finds
# nothing on a failing build, errwatch falls back to the raw exit-code output.

[watch]
paths = ["."]
ignore = [
    ".git", ".build", "TouchStrip.app", "DerivedData",
    ".octo", ".claude", ".claude-octopus",
]
globs = ["*.swift"]          # default globs omit Swift — must opt in explicitly
debounce_ms = 200

[notify]
bell = true
title = true
notification = false         # macOS attributes osascript banners to Script Editor

[export]
auto = true                  # keep .errwatch/findings-latest.md fresh for /errwatch findings

[jobs.build]
command = ["swift", "build"]
analyzer = "regex"
# e.g. /…/Sources/TouchStrip/AppDelegate.swift:12:5: error: cannot find 'foo' in scope
pattern = '^(.+?):([0-9]+):([0-9]+): (error|warning): (.+)$'
default = true
key = "b"

[jobs.build.groups]
file = 1
line = 2
column = 3
severity = 4
message = 5
